name: hanzbthalk
description: "A new Flutter project."
publish_to: "none"
version: 2.0.1+14

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  fl_chart: ^0.70.2
  flutter_slidable: ^3.1.1
  firebase_storage: ^13.0.4
  flutter_bloc: ^9.1.1
  bloc: ^9.1.0
  google_fonts: ^7.0.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  uuid: ^4.5.2
  image_picker: ^1.2.1
  file_picker: ^10.3.6
  carousel_slider: ^5.1.1
  equatable: ^2.0.8
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.3.4
  dio: ^5.9.0
  google_sign_in: ^6.2.0
  shimmer: ^3.0.0
  dartz: ^0.10.1
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.5
  path: ^1.9.0
  google_maps_flutter: ^2.5.0
  geocoding: ^3.0.0
  geolocator: ^10.1.0
  awesome_dialog: ^3.2.1
  lottie: ^3.1.2
  get_it: ^9.2.0
  webview_flutter: ^4.4.2
  cloud_functions: ^6.0.6
  firebase_app_check: ^0.4.4+2
  url_launcher: ^6.3.2
  rxdart: ^0.28.0
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#232526" # لون الخلفية للأندرويد
  adaptive_icon_foreground: "assets/icon.png"
